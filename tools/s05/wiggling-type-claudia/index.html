<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiggleType Tool</title>
  
  <!-- Insert Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Playfair+Display:ital,wght@1,700&family=Roboto:wght@900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Ensure custom fonts render immediately if available */
    body {
      font-family: 'Roboto', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <div class="min-h-screen flex flex-col md:flex-row">
    
    <!-- Control Panel -->
    <div class="w-full md:w-80 bg-white p-6 shadow-lg border-r border-gray-200 z-10 flex flex-col gap-6 h-auto md:min-h-screen shrink-0">
      <div>
        <h1 class="text-2xl font-bold tracking-tight mb-1 text-black">WiggleType</h1>
        <p class="text-sm text-gray-500">A typographic exploration tool.</p>
      </div>

      <div class="flex flex-col gap-5">
        <!-- Letter Input -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold uppercase tracking-wider text-gray-600">Letter</label>
          <input 
            type="text" 
            id="letterInput"
            maxlength="1" 
            value="A" 
            class="border border-gray-300 rounded-lg p-3 text-center text-xl font-bold uppercase focus:outline-none focus:ring-2 focus:ring-black transition"
            placeholder="A"
          />
        </div>

        <!-- Typeface Dropdown -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold uppercase tracking-wider text-gray-600">Typeface</label>
          <select 
            id="fontSelect"
            class="border border-gray-300 rounded-lg p-3 bg-white focus:outline-none focus:ring-2 focus:ring-black transition"
          >
            <option value="Roboto">Roboto (Geometric)</option>
            <option value="Oswald">Oswald (Condensed)</option>
            <option value="Playfair Display">Playfair (Serif)</option>
          </select>
        </div>

        <!-- Distance Slider -->
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label class="text-sm font-semibold uppercase tracking-wider text-gray-600">Distance (Density)</label>
            <span id="distanceVal" class="text-xs font-mono text-gray-400">12px</span>
          </div>
          <input 
            type="range" 
            id="distanceInput"
            min="5" 
            max="35" 
            value="12" 
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-black"
          />
        </div>

        <!-- Size Slider -->
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label class="text-sm font-semibold uppercase tracking-wider text-gray-600">Circle Size</label>
            <span id="circleSizeVal" class="text-xs font-mono text-gray-400">6px</span>
          </div>
          <input 
            type="range" 
            id="circleSizeInput"
            min="1" 
            max="25" 
            value="6" 
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-black"
          />
        </div>

        <!-- Amplitude Slider -->
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label class="text-sm font-semibold uppercase tracking-wider text-gray-600">Wiggle Amplitude</label>
            <span id="amplitudeVal" class="text-xs font-mono text-gray-400">12px</span>
          </div>
          <input 
            type="range" 
            id="amplitudeInput"
            min="0" 
            max="50" 
            value="12" 
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-black"
          />
        </div>
      </div>
      
      <div class="mt-auto pt-6 text-xs text-gray-400 border-t border-gray-100">
        Typographic particles are sampled dynamically. Vibrant palette inspired by the reference image. Hover over the letter to distort it!
      </div>
    </div>

    <!-- Canvas Area -->
    <div class="flex-1 p-4 md:p-8 flex items-center justify-center overflow-hidden">
      <div class="relative shadow-2xl ring-1 ring-gray-900/5 bg-white aspect-square w-full max-w-[700px]">
        <canvas
          id="mainCanvas"
          width="800"
          height="800"
          class="w-full h-full object-contain cursor-crosshair"
        ></canvas>
      </div>
    </div>

  </div>

  <script>
    // State variables
    let letter = 'A';
    let font = 'Roboto';
    let circleSize = 6;
    let amplitude = 12;
    let distance = 12;
    
    let particles = [];
    let animationId = null;
    let mouse = { x: -1000, y: -1000, active: false };

    // DOM Elements
    const letterInput = document.getElementById('letterInput');
    const fontSelect = document.getElementById('fontSelect');
    const distanceInput = document.getElementById('distanceInput');
    const circleSizeInput = document.getElementById('circleSizeInput');
    const amplitudeInput = document.getElementById('amplitudeInput');
    
    const distanceVal = document.getElementById('distanceVal');
    const circleSizeVal = document.getElementById('circleSizeVal');
    const amplitudeVal = document.getElementById('amplitudeVal');
    
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    // Generate particles by sampling text from an offscreen canvas
    async function generateParticles() {
      // Wait for fonts to be ready
      await document.fonts.ready;
      
      const width = canvas.width;
      const height = canvas.height;
      
      // Offscreen canvas setup
      const offCanvas = document.createElement('canvas');
      offCanvas.width = width;
      offCanvas.height = height;
      const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
      
      // Clear offscreen background
      offCtx.fillStyle = 'white';
      offCtx.fillRect(0, 0, width, height);
      
      // Draw the text
      const fontSize = width * 0.75;
      offCtx.font = `900 ${fontSize}px "${font}"`;
      offCtx.fillStyle = 'black';
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';
      offCtx.fillText(letter.charAt(0).toUpperCase() || ' ', width / 2, height / 2);
      
      // Read pixels
      const imageData = offCtx.getImageData(0, 0, width, height).data;
      const newParticles = [];
      const step = distance;
      const palette = ['#1d3cd1', '#ed4918', '#ffc71a', '#12a64c', '#ed8ccc', '#111111', '#ffffff', '#f0f0f0'];
      
      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          const index = (y * width + x) * 4;
          const r = imageData[index];
          
          // If pixel is dark
          if (r < 128) {
            const randomColor = palette[Math.floor(Math.random() * palette.length)];
            newParticles.push({
              baseX: x,
              baseY: y,
              phaseX: Math.random() * Math.PI * 2,
              phaseY: Math.random() * Math.PI * 2,
              speedX: 0.003 + Math.random() * 0.005,
              speedY: 0.003 + Math.random() * 0.005,
              sizeMod: 0.4 + Math.random() * 1.2, 
              color: randomColor,
              currentDistX: 0,
              currentDistY: 0,
              currentX: 0,
              currentY: 0
            });
          }
        }
      }
      
      // Center the generated particles
      if (newParticles.length > 0) {
        let minX = Infinity, maxX = -Infinity;
        let minY = Infinity, maxY = -Infinity;

        newParticles.forEach(p => {
          if (p.baseX < minX) minX = p.baseX;
          if (p.baseX > maxX) maxX = p.baseX;
          if (p.baseY < minY) minY = p.baseY;
          if (p.baseY > maxY) maxY = p.baseY;
        });

        const boxCenterX = (minX + maxX) / 2;
        const boxCenterY = (minY + maxY) / 2;
        const offsetX = (width / 2) - boxCenterX;
        const offsetY = (height / 2) - boxCenterY;

        newParticles.forEach(p => {
          p.baseX += offsetX;
          p.baseY += offsetY;
        });
      }
      
      particles = newParticles;
    }

    // Animation Loop
    function animate(time) {
      const width = canvas.width;
      const height = canvas.height;

      // Background
      ctx.fillStyle = '#e3dedb';
      ctx.fillRect(0, 0, width, height);

      if (particles.length > 0) {
        // First pass: connecting lines
        ctx.beginPath();
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = 'black';
        
        particles.forEach((p, i) => {
          let targetDistX = 0;
          let targetDistY = 0;
          const interactionRadius = 150;

          if (mouse.active) {
            const dxMouse = p.baseX - mouse.x;
            const dyMouse = p.baseY - mouse.y;
            const distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

            if (distMouse < interactionRadius) {
              const centerX = width / 2;
              const centerY = height / 2;
              const dxCenter = p.baseX - centerX;
              const dyCenter = p.baseY - centerY;
              const distCenter = Math.sqrt(dxCenter * dxCenter + dyCenter * dyCenter) || 1;

              const force = (interactionRadius - distMouse) / interactionRadius;
              const pushStrength = 150; 

              targetDistX = (dxCenter / distCenter) * force * pushStrength;
              targetDistY = (dyCenter / distCenter) * force * pushStrength;
            }
          }

          // Smooth lerp
          p.currentDistX += (targetDistX - p.currentDistX) * 0.1;
          p.currentDistY += (targetDistY - p.currentDistY) * 0.1;

          // Wiggle logic
          p.currentX = p.baseX + Math.sin(time * p.speedX + p.phaseX) * amplitude + p.currentDistX;
          p.currentY = p.baseY + Math.cos(time * p.speedY + p.phaseY) * amplitude + p.currentDistY;

          if (i === 0) {
            ctx.moveTo(p.currentX, p.currentY);
          } else {
            ctx.lineTo(p.currentX, p.currentY);
          }
        });
        
        ctx.stroke();

        // Second pass: circles
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.currentX, p.currentY, Math.max(1, circleSize * p.sizeMod), 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        });
      }

      animationId = requestAnimationFrame(animate);
    }

    // Event Listeners for UI
    letterInput.addEventListener('input', (e) => {
      letter = e.target.value;
      if(letter) generateParticles();
    });

    fontSelect.addEventListener('change', (e) => {
      font = e.target.value;
      generateParticles();
    });

    distanceInput.addEventListener('input', (e) => {
      distance = parseInt(e.target.value);
      distanceVal.textContent = distance + 'px';
      generateParticles();
    });

    circleSizeInput.addEventListener('input', (e) => {
      circleSize = parseInt(e.target.value);
      circleSizeVal.textContent = circleSize + 'px';
    });

    amplitudeInput.addEventListener('input', (e) => {
      amplitude = parseInt(e.target.value);
      amplitudeVal.textContent = amplitude + 'px';
    });

    // Event Listeners for Canvas Interaction
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      mouse = {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY,
        active: true
      };
    });

    canvas.addEventListener('mouseleave', () => {
      mouse.active = false;
    });

    // Initialization
    let initTimeout;
    document.fonts.ready.then(() => {
      // Small timeout to ensure font is fully applied before measuring
      clearTimeout(initTimeout);
      initTimeout = setTimeout(() => {
        generateParticles();
        animate(0);
      }, 100);
    });

  </script>
</body>
</html>
