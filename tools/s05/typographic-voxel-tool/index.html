<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Typographic Point Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Alfa+Slab+One&family=Anton&family=Bebas+Neue&family=Black+Ops+One&family=Bungee&family=Fredoka+One&family=Passion+One&family=Paytone+One&family=Righteous&family=Sigmar+One&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; width: 320px; }
        
        /* Custom range slider styling for a cleaner look */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 2px;
        }
        
        /* Hidden canvas for reading text pixel data */
        #text-canvas { display: none; }
        
        /* Loading overlay */
        #loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: white; z-index: 50; display: flex;
            align-items: center; justify-content: center;
            font-family: 'Anton', sans-serif; font-size: 2rem; letter-spacing: 2px;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">LOADING FONT...</div>

    <!-- 3D Container -->
    <div id="canvas-container"></div>

    <!-- Hidden 2D Canvas for Text Processing -->
    <canvas id="text-canvas" width="256" height="256"></canvas>

    <!-- UI Overlay -->
    <div id="ui-container" class="bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-gray-100">
        <h1 class="text-2xl font-bold mb-6 tracking-tight text-gray-900">Type Voxelizer</h1>
        
        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Font Family</label>
            <select id="font-select" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-black focus:border-black block p-2.5 mb-5">
                <option value="Anton">Anton</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Alfa Slab One">Alfa Slab One</option>
                <option value="Bungee">Bungee</option>
                <option value="Abril Fatface">Abril Fatface</option>
                <option value="Paytone One">Paytone One</option>
                <option value="Black Ops One">Black Ops One</option>
                <option value="Fredoka One">Fredoka One</option>
                <option value="Passion One">Passion One</option>
                <option value="Righteous">Righteous</option>
                <option value="Sigmar One">Sigmar One</option>
            </select>
        </div>

        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Text Input</label>
            <input type="text" id="text-input" value="A" maxlength="15" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-lg rounded-lg focus:ring-black focus:border-black block p-2.5 font-['Anton'] text-center">
        </div>

        <div class="mb-5">
            <div class="flex justify-between mb-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Grid Density</label>
                <span id="density-val" class="text-xs text-gray-500">40</span>
            </div>
            <input type="range" id="density-slider" min="10" max="70" value="40" step="2">
        </div>

        <div class="mb-5">
            <div class="flex justify-between mb-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Point Size</label>
                <span id="size-val" class="text-xs text-gray-500">1.2</span>
            </div>
            <input type="range" id="size-slider" min="0.2" max="3.0" value="1.2" step="0.1">
        </div>

        <div class="mb-5">
            <div class="flex justify-between mb-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Dot Color</label>
            </div>
            <input type="color" id="color-picker" value="#000000" class="w-full h-10 p-1 rounded-lg bg-gray-50 border border-gray-200 cursor-pointer">
        </div>

        <div class="mb-5">
            <div class="flex justify-between mb-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Extrusion Depth</label>
                <span id="depth-val" class="text-xs text-gray-500">14</span>
            </div>
            <input type="range" id="depth-slider" min="1" max="40" value="14" step="1">
        </div>
        
        <button id="export-btn" class="w-full bg-black text-white font-bold py-3 px-4 rounded-lg hover:bg-gray-800 transition-colors mt-2 mb-4">
            Export Video
        </button>

        <div class="text-xs text-gray-400 mt-2 text-center">
            Drag canvas to rotate • Scroll to zoom
        </div>
    </div>

    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // State variables
        let params = {
            text: 'A',
            fontFamily: 'Anton',
            gridDensity: 40,
            pointSize: 1.2,
            extrusionDepth: 14,
            color: '#000000'
        };

        // DOM Elements
        const textInput = document.getElementById('text-input');
        const fontSelect = document.getElementById('font-select');
        const densitySlider = document.getElementById('density-slider');
        const sizeSlider = document.getElementById('size-slider');
        const depthSlider = document.getElementById('depth-slider');
        const densityVal = document.getElementById('density-val');
        const sizeVal = document.getElementById('size-val');
        const depthVal = document.getElementById('depth-val');
        const exportBtn = document.getElementById('export-btn');
        const colorPicker = document.getElementById('color-picker');
        
        const canvas2d = document.getElementById('text-canvas');
        const ctx = canvas2d.getContext('2d', { willReadFrequently: true });
        
        // Three.js variables
        let scene, camera, renderer, controls, instancedMesh;
        const dummy = new THREE.Object3D();
        const physicalGridSize = 100; // Total physical size of the cube in 3D space

        // Recording variables
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        // Wait for Font to Load before starting
        document.fonts.load('10px "Anton"').then(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            init();
            animate();
        });

        function init() {
            // Setup Scene
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // Setup Camera (Isometric-ish angle to match reference)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(70, 40, 100);

            // Setup Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Setup Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true; // Slowly rotate by default
            controls.autoRotateSpeed = 0.5;

            // Generate initial mesh
            generateMesh();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            textInput.addEventListener('input', (e) => {
                params.text = e.target.value || ' ';
                updateMesh();
            });

            fontSelect.addEventListener('change', (e) => {
                params.fontFamily = e.target.value;
                // Wait for the selected font to load before redrawing
                document.fonts.load(`10px "${params.fontFamily}"`).then(() => {
                    textInput.style.fontFamily = `"${params.fontFamily}"`;
                    updateMesh();
                });
            });

            densitySlider.addEventListener('input', (e) => {
                params.gridDensity = parseInt(e.target.value);
                densityVal.innerText = params.gridDensity;
                generateMesh(); // Requires full regeneration due to instance count change
            });

            sizeSlider.addEventListener('input', (e) => {
                params.pointSize = parseFloat(e.target.value);
                sizeVal.innerText = params.pointSize.toFixed(1);
                updateMesh(); // Only updates matrices
            });

            depthSlider.addEventListener('input', (e) => {
                params.extrusionDepth = parseInt(e.target.value);
                depthVal.innerText = params.extrusionDepth;
                updateMesh(); // Only updates matrices
            });

            colorPicker.addEventListener('input', (e) => {
                params.color = e.target.value;
                if (instancedMesh) {
                    instancedMesh.material.color.set(params.color);
                }
            });
            
            // Stop auto-rotation when user interacts
            controls.addEventListener('start', () => {
                controls.autoRotate = false;
            });

            // Export Button Logic
            exportBtn.addEventListener('click', () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
        }

        // Recording Functions
        function startRecording() {
            recordedChunks = [];
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30); // 30 FPS stream
            
            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            mediaRecorder = new MediaRecorder(stream, options);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                // Clean up string for filename
                const safeText = params.text.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                a.download = `voxel-type-${safeText || 'export'}.webm`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            };

            mediaRecorder.start();
            isRecording = true;
            exportBtn.innerText = 'Stop Recording & Save';
            exportBtn.classList.remove('bg-black', 'hover:bg-gray-800');
            exportBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'animate-pulse');
            
            controls.autoRotate = true; // Auto-rotate for the video
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            exportBtn.innerText = 'Export Video';
            exportBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'animate-pulse');
            exportBtn.classList.add('bg-black', 'hover:bg-gray-800');
        }

        // Draw text to 2D canvas and get pixel data
        function getTextImageData() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas2d.width, canvas2d.height);
            
            ctx.fillStyle = 'black';
            
            // Start with a large font size and scale down if the text is too long
            let fontSize = 220;
            ctx.font = `${fontSize}px "${params.fontFamily}"`;
            
            let textWidth = ctx.measureText(params.text).width;
            if (textWidth > canvas2d.width * 0.9) {
                fontSize = fontSize * (canvas2d.width * 0.9 / textWidth);
                ctx.font = `${fontSize}px "${params.fontFamily}"`;
            }
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw text in the center
            ctx.fillText(params.text, canvas2d.width / 2, canvas2d.height / 2);
            
            return ctx.getImageData(0, 0, canvas2d.width, canvas2d.height).data;
        }

        // Generate 3D Star shape
        function createStarGeometry() {
            const shape = new THREE.Shape();
            const outerRadius = 1;
            const innerRadius = 0.45;
            const spikes = 5;

            // Start pointing upwards (offset angle by -PI/2)
            for (let i = 0; i < spikes * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                if (i === 0) shape.moveTo(x, y);
                else shape.lineTo(x, y);
            }
            shape.closePath();

            const extrudeSettings = { depth: 0.4, bevelEnabled: false };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geometry.center(); // Center the geometry for correct scaling
            return geometry;
        }

        // Creates the mesh from scratch (used on init and when density changes)
        function generateMesh() {
            if (instancedMesh) {
                scene.remove(instancedMesh);
                instancedMesh.geometry.dispose();
                instancedMesh.material.dispose();
            }

            const totalInstances = params.gridDensity * params.gridDensity * params.gridDensity;
            
            // Use custom star geometry instead of a sphere
            const geometry = createStarGeometry(); 
            // Basic unlit material
            const material = new THREE.MeshBasicMaterial({ color: params.color });
            
            instancedMesh = new THREE.InstancedMesh(geometry, material, totalInstances);
            
            updateMesh(); // Applies positions and scales
            
            scene.add(instancedMesh);
        }

        // Updates positions and scales of existing instances
        function updateMesh() {
            const imageData = getTextImageData();
            const density = params.gridDensity;
            const halfGrid = density / 2;
            const spacing = physicalGridSize / density;
            const inactiveScale = params.pointSize * 0.12; // Very small dots for background
            
            let i = 0;
            
            // Iterate through 3D Grid
            for (let z = -halfGrid; z < halfGrid; z++) {
                for (let y = -halfGrid; y < halfGrid; y++) {
                    for (let x = -halfGrid; x < halfGrid; x++) {
                        
                        // Map X/Y 3D coordinates to 2D canvas coordinates (0 to 255)
                        // Note: -y maps correctly because 3D Y is up, Canvas Y is down
                        const cx = Math.floor(THREE.MathUtils.mapLinear(x, -halfGrid, halfGrid, 0, 255));
                        const cy = Math.floor(THREE.MathUtils.mapLinear(-y, -halfGrid, halfGrid, 0, 255));
                        
                        // Get the Red channel value of the pixel (black = 0, white = 255)
                        const pixelIndex = (cy * 256 + cx) * 4;
                        const r = imageData[pixelIndex];
                        
                        let isActive = false;
                        
                        // Check if pixel is dark AND Z is within our desired extrusion depth
                        if (r < 128 && Math.abs(z) <= (params.extrusionDepth / 2)) {
                            isActive = true;
                        }
                        
                        // Set physical scale based on active state
                        const scale = isActive ? params.pointSize : inactiveScale;
                        
                        // Position in 3D space
                        dummy.position.set(x * spacing, y * spacing, z * spacing);
                        dummy.scale.set(scale, scale, scale);
                        dummy.updateMatrix();
                        
                        instancedMesh.setMatrixAt(i, dummy.matrix);
                        i++;
                    }
                }
            }
            
            // Tell Three.js the matrices need to be sent to the GPU again
            instancedMesh.instanceMatrix.needsUpdate = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
