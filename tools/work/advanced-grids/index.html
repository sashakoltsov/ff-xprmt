    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body class="bg-black">

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Iconos SVG Integrados ---
        const Download = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;

        const Move = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="19 9 22 12 19 15"></polyline><polyline points="9 19 12 22 15 19"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>;
        const Settings2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const Grid3x3 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>;
        const LayersIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline></svg>;
        const ChevronDown = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const Check = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;

        // --- Funciones de Utilidad y Motor Matemático ---

        // Generador de Números Aleatorios con Semilla (Mulberry32)
        function mulberry32(a) {
          return function() {
            var t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          }
        }

        // Interpolación Lineal
        const lerp = (a, b, t) => a + (b - a) * t;

        // Generar puntos de composición basados en los parámetros
        const generateComposition = (params) => {
          const rng = mulberry32(params.seed);
          const points = [];
          const gridNodes = []; // Guardar nodos para las líneas guía
          
          const {
            cols, rows, layers, density, globalScale, minScale, maxScale,
            scaleMode, scaleProgression, gridType, spacingMode, spacingIntensity,
            perspectiveStrength, vanishingPoints, projectionStrength,
            cameraRotX, cameraRotY, cameraRotZ
          } = params;

          for (let i = 0; i < cols; i++) {
            gridNodes[i] = [];
            for (let j = 0; j < rows; j++) {
              gridNodes[i][j] = [];
              for (let k = 0; k < layers; k++) {
                // 1. Coordenadas Normalizadas Base [-1, 1]
                let u = cols > 1 ? (i / (cols - 1)) * 2 - 1 : 0;
                let v = rows > 1 ? (j / (rows - 1)) * 2 - 1 : 0;
                let w = layers > 1 ? (k / (layers - 1)) * 2 - 1 : 0;

                // Ajustar para relación de aspecto en mallas básicas
                if (['square', 'cubic', 'diagonal25', 'isometric'].includes(gridType)) {
                  const maxDim = Math.max(cols, rows, layers);
                  u *= cols / maxDim;
                  v *= rows / maxDim;
                  w *= layers / maxDim;
                }

                // 2. Aplicar Distorsiones de Espaciado
                if (spacingMode === 'gradual') {
                  const power = 1 + (spacingIntensity * 2);
                  u = Math.sign(u) * Math.pow(Math.abs(u), power);
                  v = Math.sign(v) * Math.pow(Math.abs(v), power);
                  w = Math.sign(w) * Math.pow(Math.abs(w), power);
                } else if (spacingMode === 'irregular') {
                  u += (rng() - 0.5) * spacingIntensity * 0.5;
                  v += (rng() - 0.5) * spacingIntensity * 0.5;
                  w += (rng() - 0.5) * spacingIntensity * 0.5;
                }

                // 3. Mapeo 3D Base Avanzado
                let X = u;
                let Y = v;
                let Z = w;

                if (gridType === 'spherical') {
                  const rSphere = layers > 1 ? (w + 1) / 2 : 1; 
                  const lon = u * Math.PI;
                  const lat = v * (Math.PI / 2);
                  const sphereX = rSphere * Math.cos(lat) * Math.sin(lon);
                  const sphereY = rSphere * Math.sin(lat);
                  const sphereZ = rSphere * -Math.cos(lat) * Math.cos(lon);
                  
                  X = lerp(u, sphereX, projectionStrength);
                  Y = lerp(v, sphereY, projectionStrength);
                  Z = lerp(w, sphereZ, projectionStrength);
                } else if (gridType === 'sphere_twisted') {
                  // Esfera con torsión de líneas (Espiral)
                  const rSphere = layers > 1 ? (w + 1) / 2 : 1; 
                  const lon = u * Math.PI + v * 2 * Math.PI; // Efecto de torsión
                  const lat = v * (Math.PI / 2);
                  const sphereX = rSphere * Math.cos(lat) * Math.sin(lon);
                  const sphereY = rSphere * Math.sin(lat);
                  const sphereZ = rSphere * -Math.cos(lat) * Math.cos(lon);
                  
                  X = lerp(u, sphereX, projectionStrength);
                  Y = lerp(v, sphereY, projectionStrength);
                  Z = lerp(w, sphereZ, projectionStrength);
                } else if (gridType === 'orbit_sphere') {
                  // Órbitas que se entrelazan formando una esfera (tipo átomo/giroscopio)
                  const theta = (u + 1) * Math.PI; // 0 a 2PI
                  const phi = (v + 1) * (Math.PI / 2); // Inclinación de cada aro
                  const r = layers > 1 ? (w + 1) / 2 : 1;
                  const ringX = r * Math.cos(theta);
                  const ringY = r * Math.sin(theta);
                  
                  X = lerp(u, ringX * Math.cos(phi), projectionStrength);
                  Y = lerp(v, ringY, projectionStrength);
                  Z = lerp(w, ringX * Math.sin(phi), projectionStrength);
                } else if (gridType === 'orbit_cylinder') {
                  // Aros apilados formando un cilindro
                  const theta = (u + 1) * Math.PI;
                  const r = layers > 1 ? (w + 1) / 2 : 1;
                  X = lerp(u, r * Math.cos(theta), projectionStrength);
                  Y = lerp(v, v * 2, projectionStrength); // Altura a lo largo de Y
                  Z = lerp(w, r * Math.sin(theta), projectionStrength);
                } else if (gridType === 'rings') {
                  // Aros concéntricos planos (el radio depende de 'v')
                  const theta = (u + 1) * Math.PI;
                  const r = ((v + 1) / 2) * (layers > 1 ? (w + 1) / 2 : 1); 
                  X = lerp(u, r * Math.cos(theta), projectionStrength);
                  Y = lerp(v, r * Math.sin(theta), projectionStrength);
                  Z = lerp(w, w, projectionStrength);
                } else if (gridType === 'tunnel_cylindrical') {
                  // Túnel cilíndrico de profundidad ('v' es la profundidad)
                  const theta = (u + 1) * Math.PI;
                  const r = layers > 1 ? (w + 1) / 2 : 1;
                  const depthVal = (v + 1) * 4; // Profundidad de 0 a 8
                  X = lerp(u, r * Math.cos(theta), projectionStrength);
                  Y = lerp(v, r * Math.sin(theta), projectionStrength);
                  Z = lerp(w, depthVal, projectionStrength);
                } else if (gridType === 'tunnel_rectangular') {
                  // Túnel Rectangular/Cuadrado ('v' es la profundidad)
                  const theta = (u + 1) * Math.PI;
                  const rBase = layers > 1 ? (w + 1) / 2 : 1;
                  // Fórmula para trazar un perímetro cuadrado usando el ángulo
                  const rSq = rBase / Math.max(Math.abs(Math.cos(theta)), Math.abs(Math.sin(theta)));
                  const depthVal = (v + 1) * 4;
                  X = lerp(u, rSq * Math.cos(theta), projectionStrength);
                  Y = lerp(v, rSq * Math.sin(theta), projectionStrength);
                  Z = lerp(w, depthVal, projectionStrength);
                } else if (gridType === 'tunnel_hyperbolic') {
                  // Agujero de gusano / Toroide invertido
                  const theta = (u + 1) * Math.PI;
                  const rBase = layers > 1 ? (w + 1) / 2 : 1;
                  // El radio se estrecha en el centro (v=0) y se ensancha espectacularmente en extremos
                  const rHyp = rBase * (0.3 + 2.5 * (v * v)); 
                  const depthVal = (v + 1) * 4;
                  X = lerp(u, rHyp * Math.cos(theta), projectionStrength);
                  Y = lerp(v, rHyp * Math.sin(theta), projectionStrength);
                  Z = lerp(w, depthVal, projectionStrength);
                } else if (gridType === 'radial') {
                  const radAngle = (v + 1) * Math.PI;
                  const radRadius = (u + 1) / 2;
                  const radX = radRadius * Math.cos(radAngle);
                  const radY = radRadius * Math.sin(radAngle);
                  
                  X = lerp(u, radX, projectionStrength);
                  Y = lerp(v, radY, projectionStrength);
                  Z = lerp(w, w, projectionStrength);
                } else if (gridType === 'diagonal25') {
                  const angle25 = 25 * (Math.PI / 180);
                  const diagX = (u + v) * Math.cos(angle25);
                  const diagY = (u - v) * Math.sin(angle25);
                  X = lerp(u, diagX, projectionStrength);
                  Y = lerp(v, diagY, projectionStrength);
                  Z = lerp(w, w, projectionStrength);
                } else if (gridType === 'isometric') {
                  const angle30 = 30 * (Math.PI / 180);
                  const isoX = (u - v) * Math.cos(angle30);
                  const isoY = (u + v) * Math.sin(angle30);
                  X = lerp(u, isoX, projectionStrength);
                  Y = lerp(v, isoY, projectionStrength);
                  Z = lerp(w, w, projectionStrength);
                } else if (gridType === 'cubic') {
                  X = u; Y = v; Z = w;
                } else if (gridType === 'rectangular') {
                   X *= lerp(1, 1.5, projectionStrength);
                }

                // Aplicar Rotación de Cámara 3D manual
                const radX = (cameraRotX * Math.PI) / 180;
                const radY = (cameraRotY * Math.PI) / 180;
                const radZ = (cameraRotZ * Math.PI) / 180;

                if (radX !== 0) {
                  const ry = Y * Math.cos(radX) - Z * Math.sin(radX);
                  const rz = Y * Math.sin(radX) + Z * Math.cos(radX);
                  Y = ry; Z = rz;
                }
                if (radY !== 0) {
                  const rx = X * Math.cos(radY) + Z * Math.sin(radY);
                  const rz = -X * Math.sin(radY) + Z * Math.cos(radY);
                  X = rx; Z = rz;
                }
                if (radZ !== 0) {
                  const rx = X * Math.cos(radZ) - Y * Math.sin(radZ);
                  const ry = X * Math.sin(radZ) + Y * Math.cos(radZ);
                  X = rx; Y = ry;
                }

                // 4. Transformaciones de Perspectiva
                if (perspectiveStrength > 0) {
                  let rotX = 0;
                  let rotY = 0;

                  if (vanishingPoints >= 2) rotY = perspectiveStrength * Math.PI * 0.25; 
                  if (vanishingPoints === 3) rotX = perspectiveStrength * Math.PI * 0.25;

                  if (rotY !== 0) {
                    const rx = X * Math.cos(rotY) + Z * Math.sin(rotY);
                    const rz = -X * Math.sin(rotY) + Z * Math.cos(rotY);
                    X = rx; Z = rz;
                  }
                  if (rotX !== 0) {
                    const ry = Y * Math.cos(rotX) - Z * Math.sin(rotX);
                    const rz = Y * Math.sin(rotX) + Z * Math.cos(rotX);
                    Y = ry; Z = rz;
                  }

                  const camDist = 2.5 - perspectiveStrength; 
                  // Si Z proyecta positivamente, aleja los objetos fuertemente para el efecto túnel
                  const wProj = (Z + camDist) / camDist;
                  if (wProj > 0.1) {
                    X = X / wProj;
                    Y = Y / wProj;
                  }
                }

                gridNodes[i][j][k] = { x: X, y: Y };

                // 5. Control de Densidad
                if (rng() > density) continue;

                // 6. Cálculo de Escala
                let scaleT = 0;
                switch (scaleMode) {
                  case 'centered': scaleT = 1 - Math.min(1, Math.sqrt(u*u + v*v + w*w)); break;
                  case 'radial': scaleT = Math.min(1, Math.sqrt(u*u + v*v + w*w)); break;
                  case 'horizontal': scaleT = (u + 1) / 2; break;
                  case 'vertical': scaleT = (v + 1) / 2; break;
                  case 'diagonal': scaleT = (u + v + w + 3) / 6; break;
                  case 'random': scaleT = rng(); break;
                  case 'mirrored': scaleT = Math.max(Math.abs(u), Math.abs(v), Math.abs(w)); break;
                  default: scaleT = 0.5;
                }

                const targetScale = lerp(minScale, maxScale, scaleT);
                const distributedScale = lerp(globalScale, targetScale, scaleProgression);
                // Si la figura usa Z profunda (túneles), escalado de profundidad agresivo, sino sutil
                const zDepthFactor = ['tunnel_cylindrical', 'tunnel_rectangular', 'tunnel_hyperbolic'].includes(gridType) ? Z : Z/2;
                const depthScale = perspectiveStrength > 0 ? Math.max(0.01, 1 / (zDepthFactor + 2.0)) : 1;
                
                const finalRadius = Math.max(0.1, (distributedScale / 100) * depthScale);

                points.push({ x: X, y: Y, r: finalRadius });
              }
            }
          }
          
          return { points, gridNodes };
        };

        // --- Componentes ---

        const PanelSection = ({ title, children, icon: Icon, defaultOpen = true }) => {
          const [isOpen, setIsOpen] = useState(defaultOpen);
          return (
            <div className="border-b border-zinc-800">
              <button 
                onClick={() => setIsOpen(!isOpen)}
                className="w-full flex items-center justify-between p-4 text-sm font-medium text-zinc-300 hover:text-white transition-colors bg-zinc-900/50 hover:bg-zinc-900"
              >
                <div className="flex items-center gap-2">
                  {Icon && <Icon size={16} />}
                  {title}
                </div>
                {isOpen ? <ChevronDown size={16} /> : <ChevronRight size={16} />}
              </button>
              {isOpen && <div className="p-4 space-y-5 bg-zinc-950">{children}</div>}
            </div>
          );
        };

        const SliderControl = ({ label, value, min, max, step, onChange, format = (v) => v }) => (
          <div className="space-y-2">
            <div className="flex justify-between text-xs text-zinc-400">
              <label>{label}</label>
              <span className="font-mono">{format(value)}</span>
            </div>
            <input
              type="range"
              min={min}
              max={max}
              step={step}
              value={value}
              onChange={(e) => onChange(parseFloat(e.target.value))}
              className="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-white"
            />
          </div>
        );

        const SelectControl = ({ label, value, options, onChange }) => (
          <div className="space-y-2">
            <label className="text-xs text-zinc-400 block">{label}</label>
            <div className="relative">
              <select
                value={value}
                onChange={(e) => onChange(e.target.value)}
                className="w-full bg-zinc-900 border border-zinc-800 text-zinc-200 text-sm rounded-md py-2 px-3 appearance-none focus:outline-none focus:border-zinc-600 transition-colors cursor-pointer"
              >
                {options.map((opt) => (
                  <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
              </select>
              <ChevronDown className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none" size={14} />
            </div>
          </div>
        );

        const ToggleControl = ({ label, checked, onChange }) => (
          <div className="flex justify-between items-center py-1">
            <label className="text-xs text-zinc-400 cursor-pointer" onClick={() => onChange(!checked)}>{label}</label>
            <button 
              onClick={() => onChange(!checked)}
              className={`w-8 h-4 rounded-full transition-colors relative ${checked ? 'bg-zinc-200' : 'bg-zinc-800'}`}
            >
              <div className={`absolute top-0.5 bottom-0.5 left-0.5 w-3 bg-black rounded-full transition-transform ${checked ? 'translate-x-4' : 'translate-x-0'}`} />
            </button>
          </div>
        );

        // --- Aplicación Principal ---

        const defaultParams = {
          seed: 98765,
          density: 0.9,
          globalScale: 15,
          minScale: 2,
          maxScale: 35,
          scaleMode: 'radial',
          scaleProgression: 0.8,
          showGrid: true,
          gridType: 'tunnel_cylindrical', // Iniciar con túnel para lucir los nuevos tipos
          cols: 24,
          rows: 24,
          layers: 1,
          spacingMode: 'uniform',
          spacingIntensity: 0.5,
          perspectiveStrength: 0.4,
          vanishingPoints: 3,
          projectionStrength: 1,
          cameraRotX: 0,
          cameraRotY: 0,
          cameraRotZ: 0,
        };

        function App() {
          const [params, setParams] = useState(defaultParams);
          const [history, setHistory] = useState([defaultParams]);
          const [historyIndex, setHistoryIndex] = useState(0);
          
          const canvasRef = useRef(null);
          const wrapperRef = useRef(null);
          const [dimensions, setDimensions] = useState({ w: 800, h: 800 });
          const [viewTransform, setViewTransform] = useState({ x: 0, y: 0, scale: 1 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

          // Gestión del Historial
          const updateParam = useCallback((key, value, commit = false) => {
            setParams(prev => {
              const next = { ...prev, [key]: value };
              if (commit) {
                setHistory(h => {
                  const newHistory = h.slice(0, historyIndex + 1);
                  newHistory.push(next);
                  if (newHistory.length > 50) newHistory.shift();
                  return newHistory;
                });
                setHistoryIndex(prevIdx => Math.min(prevIdx + 1, 50));
              }
              return next;
            });
          }, [historyIndex]);

          const commitCurrentState = useCallback(() => {
            setHistory(h => {
              const newHistory = h.slice(0, historyIndex + 1);
              if (JSON.stringify(newHistory[newHistory.length - 1]) !== JSON.stringify(params)) {
                newHistory.push(params);
              }
              if (newHistory.length > 50) newHistory.shift();
              return newHistory;
            });
            setHistoryIndex(prevIdx => Math.min(prevIdx + 1, 50));
          }, [params, historyIndex]);

          const undo = () => {
            if (historyIndex > 0) {
              setHistoryIndex(historyIndex - 1);
              setParams(history[historyIndex - 1]);
            }
          };

          const randomizeAll = () => {
            const gridTypesList = [
              'square', 'rectangular', 'diagonal25', 'isometric', 
              'spherical', 'sphere_twisted', 'orbit_sphere', 'orbit_cylinder', 'rings',
              'tunnel_cylindrical', 'tunnel_rectangular', 'tunnel_hyperbolic',
              'radial', 'cubic'
            ];

            const newParams = {
              ...params,
              seed: Math.floor(Math.random() * 1000000),
              density: 0.4 + Math.random() * 0.6,
              cols: Math.floor(8 + Math.random() * 24),
              rows: Math.floor(8 + Math.random() * 24),
              layers: Math.floor(1 + Math.random() * 5),
              scaleMode: ['centered', 'radial', 'horizontal', 'vertical', 'diagonal', 'random', 'mirrored'][Math.floor(Math.random() * 7)],
              gridType: gridTypesList[Math.floor(Math.random() * gridTypesList.length)],
              spacingMode: ['uniform', 'gradual', 'irregular'][Math.floor(Math.random() * 3)],
              scaleProgression: Math.random(),
              perspectiveStrength: Math.random() < 0.5 ? 0.3 : Math.random(),
              projectionStrength: Math.random() > 0.5 ? 1 : Math.random(),
              cameraRotX: Math.floor((Math.random() - 0.5) * 90),
              cameraRotY: Math.floor((Math.random() - 0.5) * 90),
              cameraRotZ: Math.floor((Math.random() - 0.5) * 90)
            };
            setParams(newParams);
            setTimeout(() => {
                setHistory(h => [...h.slice(0, historyIndex + 1), newParams]);
                setHistoryIndex(i => i + 1);
            }, 0);
          };

          // Renderizado
          const { points, gridNodes } = useMemo(() => generateComposition(params), [params]);

          const renderCanvas = useCallback(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = dimensions.w * dpr;
            canvas.height = dimensions.h * dpr;
            ctx.scale(dpr, dpr);

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, dimensions.w, dimensions.h);

            ctx.save();
            
            ctx.translate(dimensions.w / 2 + viewTransform.x, dimensions.h / 2 + viewTransform.y);
            ctx.scale(viewTransform.scale, viewTransform.scale);

            const renderScale = Math.min(dimensions.w, dimensions.h) * 0.4;

            // Dibujar Líneas de Cuadrícula
            if (params.showGrid && gridNodes.length > 0) {
              ctx.lineWidth = 1 / viewTransform.scale;
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
              ctx.beginPath();
              
              const cols = gridNodes.length;
              const rows = gridNodes[0].length;
              const layers = gridNodes[0][0].length;

              for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                  for (let k = 0; k < layers; k++) {
                    const p1 = gridNodes[i][j][k];
                    
                    if (i < cols - 1) {
                      const p2 = gridNodes[i+1][j][k];
                      ctx.moveTo(p1.x * renderScale, p1.y * renderScale);
                      ctx.lineTo(p2.x * renderScale, p2.y * renderScale);
                    }
                    if (j < rows - 1) {
                      const p2 = gridNodes[i][j+1][k];
                      ctx.moveTo(p1.x * renderScale, p1.y * renderScale);
                      ctx.lineTo(p2.x * renderScale, p2.y * renderScale);
                    }
                    if (k < layers - 1) {
                      const p2 = gridNodes[i][j][k+1];
                      ctx.moveTo(p1.x * renderScale, p1.y * renderScale);
                      ctx.lineTo(p2.x * renderScale, p2.y * renderScale);
                    }
                  }
                }
              }
              ctx.stroke();
            }

            // Dibujar Puntos
            ctx.fillStyle = '#FFFFFF';
            points.forEach(p => {
              ctx.beginPath();
              const screenX = p.x * renderScale;
              const screenY = p.y * renderScale;
              const screenR = p.r * (renderScale / 100); 
              ctx.arc(screenX, screenY, screenR, 0, Math.PI * 2);
              ctx.fill();
            });

            ctx.restore();
          }, [points, gridNodes, params.showGrid, dimensions, viewTransform]);

          useEffect(() => { renderCanvas(); }, [renderCanvas]);

          useEffect(() => {
            const handleResize = () => {
              if (wrapperRef.current) {
                setDimensions({
                  w: wrapperRef.current.clientWidth,
                  h: wrapperRef.current.clientHeight
                });
              }
            };
            handleResize();
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
          }, []);

          const handleWheel = (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            setViewTransform(prev => ({
              ...prev,
              scale: Math.max(0.1, Math.min(10, prev.scale * (1 + delta)))
            }));
          };

          const handlePointerDown = (e) => {
            if (e.button !== 0) return;
            setIsDragging(true);
            setDragStart({ x: e.clientX - viewTransform.x, y: e.clientY - viewTransform.y });
          };

          const handlePointerMove = (e) => {
            if (!isDragging) return;
            setViewTransform(prev => ({
              ...prev,
              x: e.clientX - dragStart.x,
              y: e.clientY - dragStart.y
            }));
          };

          const handlePointerUp = () => setIsDragging(false);
          const resetView = () => setViewTransform({ x: 0, y: 0, scale: 1 });

          // Exportar Archivos
          const exportPNG = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const exportSize = 4000;
            canvas.width = exportSize;
            canvas.height = exportSize;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, exportSize, exportSize);
            ctx.translate(exportSize / 2, exportSize / 2);
            
            const renderScale = exportSize * 0.4;
            
            if (params.showGrid && gridNodes.length > 0) {
              ctx.lineWidth = 2;
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
              ctx.beginPath();
              const cols = gridNodes.length;
              const rows = gridNodes[0].length;
              const layers = gridNodes[0][0].length;

              for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                  for (let k = 0; k < layers; k++) {
                    const p1 = gridNodes[i][j][k];
                    if (i < cols - 1) {
                      const p2 = gridNodes[i+1][j][k];
                      ctx.moveTo(p1.x * renderScale, p1.y * renderScale);
                      ctx.lineTo(p2.x * renderScale, p2.y * renderScale);
                    }
                    if (j < rows - 1) {
                      const p2 = gridNodes[i][j+1][k];
                      ctx.moveTo(p1.x * renderScale, p1.y * renderScale);
                      ctx.lineTo(p2.x * renderScale, p2.y * renderScale);
                    }
                    if (k < layers - 1) {
                      const p2 = gridNodes[i][j][k+1];
                      ctx.moveTo(p1.x * renderScale, p1.y * renderScale);
                      ctx.lineTo(p2.x * renderScale, p2.y * renderScale);
                    }
                  }
                }
              }
              ctx.stroke();
            }

            ctx.fillStyle = '#FFFFFF';
            points.forEach(p => {
              ctx.beginPath();
              ctx.arc(p.x * renderScale, p.y * renderScale, p.r * (renderScale / 100), 0, Math.PI * 2);
              ctx.fill();
            });

            const link = document.createElement('a');
            link.download = `grid-composer-${params.seed}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          };

          const exportSVG = () => {
            const exportSize = 1000;
            const renderScale = exportSize * 0.4;
            
            let gridLinesSvg = '';
            if (params.showGrid && gridNodes.length > 0) {
              let pathData = '';
              const cols = gridNodes.length;
              const rows = gridNodes[0].length;
              const layers = gridNodes[0][0].length;
              
              for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                  for (let k = 0; k < layers; k++) {
                    const p1 = gridNodes[i][j][k];
                    const cx1 = (p1.x * renderScale + exportSize / 2).toFixed(3);
                    const cy1 = (p1.y * renderScale + exportSize / 2).toFixed(3);

                    if (i < cols - 1) {
                      const p2 = gridNodes[i+1][j][k];
                      pathData += `M ${cx1} ${cy1} L ${(p2.x * renderScale + exportSize / 2).toFixed(3)} ${(p2.y * renderScale + exportSize / 2).toFixed(3)} `;
                    }
                    if (j < rows - 1) {
                      const p2 = gridNodes[i][j+1][k];
                      pathData += `M ${cx1} ${cy1} L ${(p2.x * renderScale + exportSize / 2).toFixed(3)} ${(p2.y * renderScale + exportSize / 2).toFixed(3)} `;
                    }
                    if (k < layers - 1) {
                      const p2 = gridNodes[i][j][k+1];
                      pathData += `M ${cx1} ${cy1} L ${(p2.x * renderScale + exportSize / 2).toFixed(3)} ${(p2.y * renderScale + exportSize / 2).toFixed(3)} `;
                    }
                  }
                }
              }
              gridLinesSvg = `<path d="${pathData}" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none" />`;
            }

            const circles = points.map(p => {
              const cx = (p.x * renderScale + exportSize / 2).toFixed(3);
              const cy = (p.y * renderScale + exportSize / 2).toFixed(3);
              const r = (p.r * (renderScale / 100)).toFixed(3);
              return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#FFFFFF" />`;
            }).join('\n    ');

            const svgString = `<?xml version="1.0" encoding="UTF-8"?>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${exportSize} ${exportSize}" width="100%" height="100%">
          <rect width="100%" height="100%" fill="#000000" />
          <g>
            ${gridLinesSvg}
          </g>
          <g>
            ${circles}
          </g>
        </svg>`;

            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const link = document.createElement('a');
            link.download = `grid-composer-${params.seed}.svg`;
            link.href = URL.createObjectURL(blob);
            link.click();
          };

          return (
            <div className="flex h-screen w-full bg-black text-zinc-200 overflow-hidden font-sans selection:bg-zinc-800">
              
              {/* Controles Laterales */}
              <div className="w-80 h-full flex flex-col border-r border-zinc-900 bg-zinc-950 shadow-2xl z-10 flex-shrink-0">
                
                <div className="p-5 border-b border-zinc-900 flex items-center justify-between bg-black">
                  <div>
                    <h1 className="text-white font-bold tracking-tight text-sm">Compositor de Cuadrícula de Puntos</h1>
                    <p className="text-zinc-500 text-xs mt-1">Herramienta de Diseño Generativo</p>
                  </div>
                  <div className="flex gap-1">
                     <button onClick={undo} disabled={historyIndex === 0} className="p-2 text-zinc-400 hover:text-white disabled:opacity-30 disabled:hover:text-zinc-400 transition-colors" title="Deshacer">
                      <RotateCcw size={16} />
                    </button>
                    <button onClick={randomizeAll} className="p-2 text-zinc-400 hover:text-white transition-colors" title="Aleatorizar">
                      <Shuffle size={16} />
                    </button>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar">
                  
                  <PanelSection title="Controles de Puntos" icon={Settings2}>
                    <SliderControl 
                      label="Densidad" value={params.density} min={0.01} max={1} step={0.01} 
                      format={v => `${(v*100).toFixed(0)}%`}
                      onChange={v => updateParam('density', v)} 
                      onMouseUp={commitCurrentState}
                    />
                    <SliderControl 
                      label="Escala Global" value={params.globalScale} min={1} max={200} step={1} 
                      onChange={v => updateParam('globalScale', v)}
                    />
                    <div className="grid grid-cols-2 gap-4">
                      <SliderControl 
                        label="Escala Mínima" value={params.minScale} min={0.1} max={50} step={0.1} 
                        onChange={v => updateParam('minScale', v)}
                      />
                      <SliderControl 
                        label="Escala Máxima" value={params.maxScale} min={1} max={500} step={1} 
                        onChange={v => updateParam('maxScale', v)}
                      />
                    </div>
                    <div className="pt-2 border-t border-zinc-900 space-y-4">
                      <SelectControl 
                        label="Modo de Distribución de Escala" 
                        value={params.scaleMode} 
                        onChange={v => updateParam('scaleMode', v, true)}
                        options={[
                          { label: 'Radial', value: 'radial' },
                          { label: 'Centrado', value: 'centered' },
                          { label: 'Horizontal', value: 'horizontal' },
                          { label: 'Vertical', value: 'vertical' },
                          { label: 'Diagonal', value: 'diagonal' },
                          { label: 'Espejado', value: 'mirrored' },
                          { label: 'Ruido Aleatorio', value: 'random' },
                        ]}
                      />
                      <SliderControl 
                        label="Intensidad Progresiva" value={params.scaleProgression} min={0} max={1} step={0.05} 
                        format={v => v.toFixed(2)}
                        onChange={v => updateParam('scaleProgression', v)}
                      />
                    </div>
                  </PanelSection>

                  <PanelSection title="Cuadrícula y Espaciado" icon={Grid3x3}>
                    <SelectControl 
                      label="Tipo de Cuadrícula" 
                      value={params.gridType} 
                      onChange={v => updateParam('gridType', v, true)}
                      options={[
                        { label: 'Base Cuadrada', value: 'square' },
                        { label: 'Matriz Rectangular', value: 'rectangular' },
                        { label: 'Diagonal 25°', value: 'diagonal25' },
                        { label: 'Base Isométrica', value: 'isometric' },
                        { label: 'Proyección Esférica', value: 'spherical' },
                        { label: 'Esfera Torcida (Espiral)', value: 'sphere_twisted' },
                        { label: 'Órbitas Esféricas', value: 'orbit_sphere' },
                        { label: 'Órbitas Cilíndricas', value: 'orbit_cylinder' },
                        { label: 'Aros Concéntricos', value: 'rings' },
                        { label: 'Túnel Cilíndrico', value: 'tunnel_cylindrical' },
                        { label: 'Túnel Rectangular', value: 'tunnel_rectangular' },
                        { label: 'Túnel Hiperbólico', value: 'tunnel_hyperbolic' },
                        { label: 'Matriz Radial', value: 'radial' },
                        { label: 'Volumen Cúbico', value: 'cubic' },
                      ]}
                    />
                    <div className="grid grid-cols-3 gap-4">
                      <SliderControl 
                        label="Columnas" value={params.cols} min={1} max={50} step={1} 
                        onChange={v => updateParam('cols', v)}
                      />
                      <SliderControl 
                        label="Filas" value={params.rows} min={1} max={50} step={1} 
                        onChange={v => updateParam('rows', v)}
                      />
                      <SliderControl 
                        label="Capas (Z)" value={params.layers} min={1} max={50} step={1} 
                        onChange={v => updateParam('layers', v)}
                      />
                    </div>
                    
                    <div className="pt-2 border-t border-zinc-900 space-y-4">
                       <SelectControl 
                        label="Modo de Espaciado" 
                        value={params.spacingMode} 
                        onChange={v => updateParam('spacingMode', v, true)}
                        options={[
                          { label: 'Uniforme', value: 'uniform' },
                          { label: 'Distorsión Gradual', value: 'gradual' },
                          { label: 'Ruido Irregular', value: 'irregular' },
                        ]}
                      />
                      <SliderControl 
                        label="Intensidad de Espaciado" value={params.spacingIntensity} min={0} max={1} step={0.01} 
                        onChange={v => updateParam('spacingIntensity', v)}
                      />
                    </div>
                    
                    <div className="pt-2 border-t border-zinc-900 space-y-2">
                      <ToggleControl 
                        label="Mostrar Cuadrícula Guía" 
                        checked={params.showGrid} 
                        onChange={v => updateParam('showGrid', v, true)} 
                      />
                    </div>
                  </PanelSection>

                  <PanelSection title="Perspectiva y Proyección" icon={LayersIcon}>
                     <SliderControl 
                        label="Distorsión de Perspectiva" value={params.perspectiveStrength} min={0} max={0.95} step={0.05} 
                        format={v => v === 0 ? 'Off' : v.toFixed(2)}
                        onChange={v => updateParam('perspectiveStrength', v)}
                      />
                       <SelectControl 
                        label="Puntos de Fuga" 
                        value={params.vanishingPoints} 
                        onChange={v => updateParam('vanishingPoints', parseInt(v), true)}
                        options={[
                          { label: 'Perspectiva de 1 Punto', value: 1 },
                          { label: 'Perspectiva de 2 Puntos', value: 2 },
                          { label: 'Perspectiva de 3 Puntos', value: 3 },
                        ]}
                      />
                       <SliderControl 
                        label="Fuerza de Proyección de Forma" value={params.projectionStrength} min={0} max={1} step={0.05} 
                        onChange={v => updateParam('projectionStrength', v)}
                      />
                      
                      <div className="pt-2 border-t border-zinc-900 space-y-4">
                        <p className="text-xs text-zinc-400 font-medium">Vista de Cámara (Rotación 3D)</p>
                        <SliderControl 
                          label="Eje X (Inclinación)" value={params.cameraRotX} min={-180} max={180} step={1} 
                          format={v => `${v}°`}
                          onChange={v => updateParam('cameraRotX', v)}
                        />
                        <SliderControl 
                          label="Eje Y (Panorámica)" value={params.cameraRotY} min={-180} max={180} step={1} 
                          format={v => `${v}°`}
                          onChange={v => updateParam('cameraRotY', v)}
                        />
                        <SliderControl 
                          label="Eje Z (Rotación)" value={params.cameraRotZ} min={-180} max={180} step={1} 
                          format={v => `${v}°`}
                          onChange={v => updateParam('cameraRotZ', v)}
                        />
                      </div>
                  </PanelSection>
                  
                   <div className="p-4 border-b border-zinc-900">
                     <div className="flex justify-between items-center text-xs text-zinc-500 mb-2">
                        <span>Semilla Aleatoria</span>
                        <span className="font-mono">{params.seed}</span>
                     </div>
                     <button 
                        onClick={() => {
                           updateParam('seed', Math.floor(Math.random() * 1000000));
                           commitCurrentState();
                        }}
                        className="w-full py-2 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 rounded text-xs font-medium transition-colors border border-zinc-800"
                      >
                        Regenerar Semilla
                      </button>
                   </div>
                </div>

                <div className="p-4 bg-black border-t border-zinc-900 flex gap-2">
                  <button 
                    onClick={exportSVG}
                    className="flex-1 flex items-center justify-center gap-2 py-2.5 bg-zinc-100 hover:bg-white text-black rounded text-sm font-semibold transition-colors"
                  >
                    <Download size={16} /> SVG
                  </button>
                  <button 
                    onClick={exportPNG}
                    className="flex-1 flex items-center justify-center gap-2 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-white rounded text-sm font-semibold transition-colors"
                  >
                    <ImageIcon size={16} /> PNG
                  </button>
                </div>
              </div>

              {/* Área Principal del Canvas */}
              <div 
                ref={wrapperRef}
                className="flex-1 relative cursor-grab active:cursor-grabbing"
                onWheel={handleWheel}
                onPointerDown={handlePointerDown}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerLeave={handlePointerUp}
              >
                <canvas 
                  ref={canvasRef} 
                  className="absolute inset-0 w-full h-full touch-none"
                />
                
                <div className="absolute top-6 right-6 flex gap-2">
                   <div className="bg-black/50 backdrop-blur border border-zinc-800/50 rounded-lg p-1.5 flex gap-1 pointer-events-auto">
                     <button onClick={() => setViewTransform(p => ({...p, scale: p.scale * 1.2}))} className="p-1.5 text-zinc-400 hover:text-white rounded hover:bg-zinc-800 transition-colors">
                       <ZoomIn size={18} />
                     </button>
                     <button onClick={() => setViewTransform(p => ({...p, scale: p.scale / 1.2}))} className="p-1.5 text-zinc-400 hover:text-white rounded hover:bg-zinc-800 transition-colors">
                       <ZoomOut size={18} />
                     </button>
                     <div className="w-px bg-zinc-800 my-1 mx-1"></div>
                     <button onClick={resetView} className="p-1.5 text-zinc-400 hover:text-white rounded hover:bg-zinc-800 transition-colors">
                       <Move size={18} />
                     </button>
                   </div>
                </div>

                <div className="absolute bottom-6 right-6 pointer-events-none text-right">
                   <p className="text-zinc-600 font-mono text-[10px] tracking-wider uppercase flex items-center gap-2 justify-end">
                     <Check size={12} className="text-emerald-700" />
                     {points.length} intersecciones renderizadas
                   </p>
                </div>
              </div>
            </div>
          );
        }

        // Renderizar la app en el div "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
