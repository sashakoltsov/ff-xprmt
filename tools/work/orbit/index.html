document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Orbit Studio<\u002Ftitle>\n<style>:root {\n  --bg-0: #08090c; --bg-1: #0f1116; --bg-2: #161922; --bg-3: #1f232e;\n  --line: rgba(255,255,255,0.075); --line-2: rgba(255,255,255,0.12);\n  --text: #e7e9ef; --text-dim: #8b909d; --text-faint: #565b67;\n  --stage: #050609;\n  --accent: oklch(0.70 0.17 250); --accent-soft: oklch(0.70 0.17 250 / 0.16);\n  --accent-text: #fff;\n  --shadow: 0 18px 50px -12px rgba(0,0,0,0.6);\n  --rad: 8px;\n  font-family: -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n}\nbody.light {\n  --bg-0: #e7e9ee; --bg-1: #f5f6f8; --bg-2: #ffffff; --bg-3: #e8eaef;\n  --line: rgba(0,0,0,0.09); --line-2: rgba(0,0,0,0.16);\n  --text: #1a1c22; --text-dim: #5b616d; --text-faint: #9aa0ac;\n  --stage: #dde0e7; --accent-soft: oklch(0.70 0.17 250 / 0.14);\n  --shadow: 0 18px 50px -16px rgba(20,30,60,0.28);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; height: 100%; }\nbody {\n  height: 100vh; display: flex; flex-direction: column; overflow: hidden;\n  background: var(--bg-0); color: var(--text);\n  font-size: 13px; -webkit-font-smoothing: antialiased; user-select: none;\n}\nbutton { font-family: inherit; cursor: pointer; }\n.mono { font-family: ui-monospace, \"SF Mono\", Menlo, monospace; }\n\n/* ---------- topbar ---------- */\n#topbar {\n  height: 52px; flex: none; display: flex; align-items: center; justify-content: space-between;\n  padding: 0 14px; background: var(--bg-1); border-bottom: 1px solid var(--line); position: relative; z-index: 40;\n}\n.brand { display: flex; align-items: center; gap: 9px; font-size: 14.5px; font-weight: 600; letter-spacing: 0.01em; }\n.brand .glyph { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--accent); position: relative; }\n.brand .glyph::after { content: ''; position: absolute; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); top: 50%; left: 50%; transform: translate(-50%,-50%); }\n.brand small { color: var(--text-faint); font-weight: 500; font-size: 11px; margin-left: 2px; }\n.top-group { display: flex; align-items: center; gap: 7px; }\n.tbtn {\n  height: 32px; min-width: 32px; padding: 0 9px; display: inline-flex; align-items: center; justify-content: center; gap: 7px;\n  background: var(--bg-2); border: 1px solid var(--line); color: var(--text-dim); border-radius: var(--rad);\n  font-size: 12.5px; transition: background .15s, color .15s, border-color .15s;\n}\n.tbtn:hover { background: var(--bg-3); color: var(--text); }\n.tbtn:disabled { opacity: 0.35; pointer-events: none; }\n.tbtn.accent { background: var(--accent); color: var(--accent-text); border-color: transparent; font-weight: 600; }\n.tbtn.accent:hover { filter: brightness(1.08); }\n.tdiv { width: 1px; height: 22px; background: var(--line-2); margin: 0 3px; }\n\n/* ---------- workspace ---------- */\n#workspace { flex: 1; display: grid; grid-template-columns: 296px 1fr 322px; min-height: 0; }\n.panel { background: var(--bg-1); overflow-y: auto; overflow-x: hidden; }\n#left { border-right: 1px solid var(--line); }\n#right { border-left: 1px solid var(--line); }\n.panel-head { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint);\n  padding: 16px 14px 4px; font-weight: 600; position: sticky; top: 0; background: var(--bg-1); z-index: 2; }\n.panel::-webkit-scrollbar { width: 9px; }\n.panel::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 6px; border: 2px solid var(--bg-1); }\n\n/* ---------- stage ---------- */\n#stage { position: relative; background: var(--stage); overflow: hidden; min-width: 0; }\n#view { display: block; width: 100%; height: 100%; cursor: grab; }\n#view:active { cursor: grabbing; }\n.hud { position: absolute; top: 12px; left: 14px; display: flex; gap: 7px; pointer-events: none; font-size: 11px; }\n.hud-chip { background: rgba(0,0,0,0.4); color: #cfd3dc; padding: 4px 9px; border-radius: 6px;\n  font-family: ui-monospace, Menlo, monospace; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.06); }\n.hud-chip.name { color: #fff; font-family: inherit; font-weight: 600; }\n.stage-hint { position: absolute; bottom: 12px; left: 14px; font-size: 11px; color: rgba(255,255,255,0.32);\n  pointer-events: none; font-family: ui-monospace, Menlo, monospace; }\nbody.light .hud-chip { background: rgba(255,255,255,0.6); color: #2a2e38; border-color: rgba(0,0,0,0.06); }\nbody.light .stage-hint { color: rgba(0,0,0,0.34); }\n\n/* ---------- controls ---------- */\n.sec-head { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint);\n  padding: 17px 14px 7px; font-weight: 600; }\n.ctrl { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 6px 14px; min-height: 30px; }\n.ctrl.col { flex-direction: column; align-items: stretch; gap: 9px; }\n.ctrl-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }\n.ctrl-body { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end; }\n.ctrl-val { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--text); min-width: 36px; text-align: right; }\n\ninput.rng { -webkit-appearance: none; appearance: none; flex: 1; max-width: 150px; height: 3px; border-radius: 3px;\n  background: var(--bg-3); outline: none; }\ninput.rng::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;\n  background: var(--text); border: 2px solid var(--bg-1); cursor: pointer; transition: background .12s; box-shadow: 0 1px 3px rgba(0,0,0,.4); }\ninput.rng::-webkit-slider-thumb:hover { background: var(--accent); }\ninput.rng::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--text); border: 2px solid var(--bg-1); cursor: pointer; }\n\n.sel { background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 7px;\n  padding: 6px 8px; font-size: 12px; max-width: 170px; flex: 1; outline: none; }\n.sel:focus { border-color: var(--accent); }\n\n.seg { display: flex; background: var(--bg-2); border-radius: 8px; padding: 3px; gap: 3px; border: 1px solid var(--line); }\n.seg-btn { flex: 1; padding: 6px 4px; font-size: 12px; border-radius: 6px; color: var(--text-dim); background: transparent; border: none; transition: background .12s, color .12s; }\n.seg-btn:hover { color: var(--text); }\n.seg-btn.on { background: var(--accent); color: var(--accent-text); }\n\n.switch { width: 38px; height: 22px; border-radius: 11px; background: var(--bg-3); border: 1px solid var(--line); position: relative; padding: 0; transition: background .15s; }\n.switch .knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--text-dim); transition: transform .15s, background .15s; }\n.switch.on { background: var(--accent); border-color: transparent; }\n.switch.on .knob { transform: translateX(16px); background: #fff; }\n\n.col-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }\ninput.col-in, input.pal-sw { -webkit-appearance: none; appearance: none; width: 30px; height: 24px; border: 1px solid var(--line); border-radius: 6px; padding: 0; background: none; cursor: pointer; }\ninput.col-in::-webkit-color-swatch-wrapper, input.pal-sw::-webkit-color-swatch-wrapper { padding: 2px; }\ninput.col-in::-webkit-color-swatch, input.pal-sw::-webkit-color-swatch { border: none; border-radius: 4px; }\n.col-hex { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--text-dim); min-width: 60px; }\n.pal-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }\n.pal-sw { width: 28px; height: 28px; }\n.mpreset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }\n.mpreset-btn { padding: 8px 6px; font-size: 11.5px; border-radius: 7px; background: var(--bg-2);\n  border: 1px solid var(--line); color: var(--text-dim); transition: background .12s, color .12s, border-color .12s; }\n.mpreset-btn:hover { background: var(--bg-3); color: var(--text); }\n.mpreset-btn.on { background: var(--accent-soft); color: var(--text); border-color: var(--accent); }\n.mini-btn { width: 26px; height: 26px; border-radius: 6px; background: var(--bg-2); border: 1px solid var(--line); color: var(--text-dim); font-size: 14px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }\n.mini-btn:hover { background: var(--bg-3); color: var(--text); }\n.file-btn { position: relative; overflow: hidden; padding: 7px 12px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 7px; font-size: 12px; color: var(--text-dim); }\n.file-btn:hover { color: var(--text); }\n.file-in { position: absolute; inset: 0; opacity: 0; cursor: pointer; }\n\n/* ---------- accordion ---------- */\n.acc { border-bottom: 1px solid var(--line); }\n.acc-head { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 13px 14px;\n  background: none; border: none; color: var(--text); font-size: 12.5px; font-weight: 600; letter-spacing: 0.01em; }\n.acc-head:hover { color: var(--accent); }\n.acc-chev { color: var(--text-faint); transition: transform .2s; font-size: 14px; }\n.acc.open .acc-chev { transform: rotate(180deg); }\n.acc-body { display: none; padding: 2px 0 12px; }\n.acc.open .acc-body { display: block; }\n\n/* ---------- timeline ---------- */\n#timeline { height: 58px; flex: none; display: flex; align-items: center; gap: 14px; padding: 0 16px;\n  background: var(--bg-1); border-top: 1px solid var(--line); z-index: 30; }\n.t-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg-2); border: 1px solid var(--line);\n  color: var(--text); display: inline-flex; align-items: center; justify-content: center; }\n.t-btn:hover { background: var(--bg-3); }\n.t-btn.primary { background: var(--accent); color: #fff; border-color: transparent; }\n.t-btn.primary:hover { filter: brightness(1.08); }\n#scrub { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; border-radius: 3px; background: var(--bg-3); outline: none; }\n#scrub::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg-1); cursor: pointer; }\n#scrub::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg-1); }\n#time-lbl { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--text-dim); min-width: 122px; text-align: center; }\n.t-side { display: flex; align-items: center; gap: 9px; }\n.t-mini { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-dim); }\n#btn-loop { padding: 6px 10px; border-radius: 7px; background: var(--bg-2); border: 1px solid var(--line); color: var(--text-dim); font-size: 11.5px; }\n#btn-loop.on { color: var(--accent); border-color: var(--accent); }\n#dur-input { width: 50px; background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 5px 6px; font-size: 11.5px; font-family: ui-monospace, Menlo, monospace; }\n\n/* ---------- export popover ---------- */\n#export-pop { position: absolute; top: 48px; right: 12px; width: 236px; background: var(--bg-1); border: 1px solid var(--line-2);\n  border-radius: 12px; padding: 6px; box-shadow: var(--shadow); display: none; z-index: 60; }\n#export-pop.open { display: block; }\n.pop-sec { padding: 9px 10px; }\n.pop-sec + .pop-sec { border-top: 1px solid var(--line); }\n.pop-title { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; font-weight: 600; }\n.pop-row { display: flex; gap: 6px; align-items: center; }\n.pop-btn { flex: 1; padding: 7px; background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 7px; font-size: 12px; }\n.pop-btn:hover { background: var(--bg-3); border-color: var(--accent); }\n.pop-btn.full { width: 100%; }\n.pop-check { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-dim); margin-top: 9px; }\n.pop-field { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }\n.pop-field input, .pop-field select { width: 78px; background: var(--bg-2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 5px 6px; font-size: 12px; }\n#vid-prog { height: 4px; background: var(--bg-3); border-radius: 3px; margin-top: 9px; overflow: hidden; display: none; }\n#vid-prog.show { display: block; }\n#vid-bar { height: 100%; width: 0; background: var(--accent); transition: width .1s; }\n\n/* ---------- preset browser ---------- */\n#preset-browser { position: fixed; inset: 0; background: rgba(0,0,0,0.62); backdrop-filter: blur(8px);\n  display: none; align-items: center; justify-content: center; z-index: 100; }\n#preset-browser.open { display: flex; }\n.preset-modal { width: min(980px, 92vw); max-height: 86vh; background: var(--bg-1); border: 1px solid var(--line-2);\n  border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); }\n.preset-modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }\n.preset-modal-head h2 { margin: 0; font-size: 16px; font-weight: 600; }\n.preset-modal-head p { margin: 3px 0 0; font-size: 12px; color: var(--text-dim); }\n#preset-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(212px, 1fr)); gap: 16px; overflow-y: auto; }\n.preset-card { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--bg-2); transition: transform .15s, border-color .15s; }\n.preset-card:hover { transform: translateY(-3px); border-color: var(--accent); }\n.preset-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }\n.pthumb-wrap { background: #04050a; line-height: 0; }\n.pthumb { width: 100%; height: auto; display: block; }\n.preset-meta { padding: 11px 13px; }\n.preset-name { font-size: 13px; font-weight: 600; }\n.preset-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.35; }\n\n/* ---------- toast ---------- */\n#toast { position: fixed; bottom: 74px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--bg-3);\n  border: 1px solid var(--line-2); color: var(--text); padding: 9px 16px; border-radius: 9px; font-size: 12.5px;\n  opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 200; box-shadow: var(--shadow); }\n#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <!-- TOP BAR -->\n  <header id=\"topbar\">\n    <div class=\"brand\"><span class=\"glyph\"><\u002Fspan>Orbit Studio <small>generative point systems<\u002Fsmall><\u002Fdiv>\n    <div class=\"top-group\">\n      <button class=\"tbtn\" id=\"btn-undo\" title=\"Undo (⌘Z)\">↶<\u002Fbutton>\n      <button class=\"tbtn\" id=\"btn-redo\" title=\"Redo (⌘⇧Z)\">↷<\u002Fbutton>\n      <span class=\"tdiv\"><\u002Fspan>\n      <button class=\"tbtn\" id=\"btn-theme\" title=\"Toggle theme\">☀<\u002Fbutton>\n      <button class=\"tbtn\" id=\"btn-reset\" title=\"Reset\">Reset<\u002Fbutton>\n      <span class=\"tdiv\"><\u002Fspan>\n      <button class=\"tbtn wide\" id=\"btn-presets\" title=\"Presets (P)\">◳ Presets<\u002Fbutton>\n      <button class=\"tbtn wide accent\" id=\"btn-export\" title=\"Export\">↧ Export<\u002Fbutton>\n    <\u002Fdiv>\n    <!-- export popover -->\n    <div id=\"export-pop\">\n      <div class=\"pop-sec\">\n        <div class=\"pop-title\">PNG · high-resolution<\u002Fdiv>\n        <div class=\"pop-row\">\n          <button class=\"pop-btn\" data-png=\"1\">1×<\u002Fbutton>\n          <button class=\"pop-btn\" data-png=\"2\">2×<\u002Fbutton>\n          <button class=\"pop-btn\" data-png=\"4\">4×<\u002Fbutton>\n        <\u002Fdiv>\n        <label class=\"pop-check\"><input type=\"checkbox\" id=\"png-transp\"> Transparent background<\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"pop-sec\">\n        <div class=\"pop-title\">SVG · editable vectors<\u002Fdiv>\n        <button class=\"pop-btn full\" id=\"btn-svg\">Export SVG<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"pop-sec\">\n        <div class=\"pop-title\">Video · MP4 / WebM<\u002Fdiv>\n        <div class=\"pop-field\"><span>Duration (s)<\u002Fspan><input type=\"number\" id=\"vid-dur\" value=\"6\" min=\"1\" max=\"30\" step=\"1\"><\u002Fdiv>\n        <div class=\"pop-field\"><span>Frame rate<\u002Fspan>\n          <select id=\"vid-fps\"><option value=\"30\">30 fps<\u002Foption><option value=\"60\">60 fps<\u002Foption><\u002Fselect>\n        <\u002Fdiv>\n        <button class=\"pop-btn full\" id=\"btn-vid\">● Record &amp; export<\u002Fbutton>\n        <div id=\"vid-prog\"><div id=\"vid-bar\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- WORKSPACE -->\n  <main id=\"workspace\">\n    <aside id=\"left\" class=\"panel\">\n      <div class=\"panel-head\">Generate<\u002Fdiv>\n      <div id=\"left-body\"><\u002Fdiv>\n    <\u002Faside>\n\n    <section id=\"stage\">\n      <canvas id=\"view\"><\u002Fcanvas>\n      <div class=\"hud\">\n        <span class=\"hud-chip name\" id=\"hud-preset\">Planetary System<\u002Fspan>\n        <span class=\"hud-chip\" id=\"hud-points\">0 pts<\u002Fspan>\n        <span class=\"hud-chip\" id=\"hud-fps\">60 fps<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stage-hint\">drag to orbit · scroll to zoom · shift-drag to pan<\u002Fdiv>\n    <\u002Fsection>\n\n    <aside id=\"right\" class=\"panel\">\n      <div class=\"panel-head\">Appearance &amp; Motion<\u002Fdiv>\n      <div id=\"right-body\"><\u002Fdiv>\n    <\u002Faside>\n  <\u002Fmain>\n\n  <!-- TIMELINE -->\n  <footer id=\"timeline\">\n    <div class=\"t-side\">\n      <button class=\"t-btn\" id=\"btn-restart\" title=\"Restart (0)\">⟲<\u002Fbutton>\n      <button class=\"t-btn primary\" id=\"btn-play\" title=\"Play / pause (space)\"><\u002Fbutton>\n    <\u002Fdiv>\n    <span id=\"time-lbl\">0.0s / 8.0s<\u002Fspan>\n    <input type=\"range\" id=\"scrub\" min=\"0\" max=\"1000\" value=\"0\">\n    <div class=\"t-side\">\n      <button id=\"btn-loop\" class=\"on\" title=\"Loop\">↻ Loop<\u002Fbutton>\n      <span class=\"t-mini\">Duration <input type=\"number\" id=\"dur-input\" value=\"8\" min=\"0.5\" max=\"60\" step=\"0.5\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- PRESET BROWSER -->\n  <div id=\"preset-browser\">\n    <div class=\"preset-modal\">\n      <div class=\"preset-modal-head\">\n        <div><h2>Preset Browser<\u002Fh2><p>Load a starting point — every parameter remains fully editable.<\u002Fp><\u002Fdiv>\n        <button class=\"tbtn\" id=\"preset-close\">✕ Close<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"preset-grid\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"toast\"><\u002Fdiv>\n\n  <!-- engine -->\n  <script src=\"e1767f1f-9f04-4739-b082-bfd2fa79d3c7\"><\u002Fscript>\n  <script src=\"987bc6f3-fe0c-49e8-9bea-363da27c9ef0\"><\u002Fscript>\n  <script src=\"c1756ae9-e82d-4711-940f-8d27eba907a3\"><\u002Fscript>\n  <script src=\"3e36dbdf-40b6-49df-8f64-247820928824\"><\u002Fscript>\n  <script src=\"c3cee577-7d2d-47c6-90fc-0e7613c10c78\"><\u002Fscript>\n  <script src=\"d7ba6cf7-e572-4e8d-a300-1c017482b87e\"><\u002Fscript>\n  <script src=\"9257db7e-cf5b-4f84-97c8-8e45ad694c8b\"><\u002Fscript>\n  <!-- app -->\n  <script src=\"00c571af-c852-4a55-b1c0-fca83642c6db\"><\u002Fscript>\n  <script src=\"a9ba0379-19aa-4fed-bdc0-26f8506647b2\"><\u002Fscript>\n  <script>\n    (function () {\n      function boot() {\n        var app = window.OrbitApp.init();\n        window.OSUI.init(app);\n      }\n      if (document.readyState === 'loading') window.addEventListener('DOMContentLoaded', boot);\n      else boot();\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
